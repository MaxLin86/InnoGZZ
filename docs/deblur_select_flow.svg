<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="900" viewBox="0 0 1280 900">
  <defs>
    <style>
      .bg{fill:#fafafa}.title{font:700 30px Arial,"Microsoft YaHei",sans-serif;fill:#111827}.sub{font:15px Arial,"Microsoft YaHei",sans-serif;fill:#4b5563}.lane1{fill:#f5f3ff;stroke:#ddd6fe;stroke-width:1.5;rx:14}.lane2{fill:#eff6ff;stroke:#bfdbfe;stroke-width:1.5;rx:14}.lane3{fill:#ecfdf5;stroke:#bbf7d0;stroke-width:1.5;rx:14}.box{fill:#fff;stroke:#7c3aed;stroke-width:2;rx:10}.select{fill:#fff;stroke:#2563eb;stroke-width:2;rx:10}.deblur{fill:#fff;stroke:#059669;stroke-width:2;rx:10}.decision{fill:#fff7ed;stroke:#ea580c;stroke-width:2}.note{fill:#f3f4f6;stroke:#9ca3af;stroke-width:1.4;rx:8}.text{font:17px Arial,"Microsoft YaHei",sans-serif;fill:#111827}.small{font:14px Arial,"Microsoft YaHei",sans-serif;fill:#374151}.tiny{font:13px Arial,"Microsoft YaHei",sans-serif;fill:#4b5563}.arrow{stroke:#374151;stroke-width:2.2;fill:none;marker-end:url(#arrow)}.dashed{stroke:#6b7280;stroke-width:2;fill:none;stroke-dasharray:6 5;marker-end:url(#arrow)}.label{font:14px Arial,"Microsoft YaHei",sans-serif;fill:#374151}
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#374151"/></marker>
  </defs>
  <rect class="bg" width="1280" height="900"/>
  <text class="title" x="48" y="56">deblur_select 模糊选帧流程</text>
  <text class="sub" x="48" y="84">三阶段从左到右：current 捕获、selected 选择、deblur 生成。selected 图不在 UI 中显示，但会保存到文件。</text>

  <rect class="lane1" x="55" y="130" width="330" height="640"/>
  <text class="small" x="85" y="160">1. Current：用户按键帧</text>
  <rect class="lane2" x="475" y="130" width="330" height="640"/>
  <text class="small" x="505" y="160">2. Selected：邻域最清晰帧</text>
  <rect class="lane3" x="895" y="130" width="330" height="640"/>
  <text class="small" x="925" y="160">3. Deblur：处理与保存</text>

  <rect class="box" x="105" y="205" width="230" height="78"/>
  <text class="text" x="170" y="236">视频播放</text>
  <text class="small" x="145" y="260">OpenCV 预览窗口</text>

  <rect class="box" x="105" y="340" width="230" height="78"/>
  <text class="text" x="168" y="371">按 S 保存</text>
  <text class="small" x="140" y="395">得到 current 帧和帧号</text>

  <rect class="box" x="105" y="475" width="230" height="78"/>
  <text class="text" x="172" y="506">保存 current</text>
  <text class="small" x="137" y="530">__current.jpg / current 指标</text>

  <polygon class="decision" points="640,195 770,255 640,315 510,255"/>
  <text class="text" x="580" y="250">deblur_mode?</text>
  <text class="small" x="586" y="274">unsharp / temporal</text>

  <rect class="select" x="525" y="360" width="230" height="88"/>
  <text class="text" x="575" y="392">构造候选窗口</text>
  <text class="small" x="550" y="416">current ± temporal_radius</text>
  <text class="small" x="550" y="438">按 temporal_stride 采样</text>

  <rect class="select" x="525" y="500" width="230" height="118"/>
  <text class="text" x="570" y="532">Sharpness Score</text>
  <text class="small" x="550" y="558">灰度化 + 有效 mask</text>
  <text class="small" x="550" y="582">排除黑边和强反光</text>
  <text class="small" x="550" y="606">Sobel 梯度统计</text>

  <rect class="select" x="525" y="670" width="230" height="78"/>
  <text class="text" x="590" y="701">selected</text>
  <text class="small" x="548" y="725">score 最高的候选帧</text>

  <rect class="deblur" x="945" y="360" width="230" height="102"/>
  <text class="text" x="1008" y="392">亮度锐化</text>
  <text class="small" x="972" y="418">BGR → LAB → L 通道</text>
  <text class="small" x="972" y="440">L*(1+a)-blur(L)*a</text>

  <rect class="deblur" x="945" y="535" width="230" height="78"/>
  <text class="text" x="1028" y="566">deblur</text>
  <text class="small" x="990" y="590">LAB 转回 BGR</text>

  <rect class="deblur" x="945" y="690" width="230" height="118"/>
  <text class="text" x="1018" y="722">保存输出</text>
  <text class="small" x="972" y="748">__selected.jpg</text>
  <text class="small" x="972" y="772">__deblur.jpg</text>
  <text class="small" x="972" y="796">__deblur_metrics.json</text>

  <rect class="note" x="90" y="650" width="260" height="80"/>
  <text class="small" x="115" y="680">UI 显示：</text>
  <text class="tiny" x="115" y="704">左下角 current，右下角 deblur(selected)</text>

  <path class="arrow" d="M220 283 L220 340"/>
  <path class="arrow" d="M220 418 L220 475"/>
  <path class="arrow" d="M335 379 C410 379 455 255 510 255"/>

  <path class="arrow" d="M640 315 L640 360"/>
  <path class="arrow" d="M640 448 L640 500"/>
  <path class="arrow" d="M640 618 L640 670"/>
  <path class="arrow" d="M755 710 C850 710 900 455 945 415"/>

  <path class="arrow" d="M770 255 C850 270 900 350 945 405"/>
  <path class="arrow" d="M1060 462 L1060 535"/>
  <path class="arrow" d="M1060 613 L1060 690"/>

  <text class="label" x="792" y="246">unsharp: current 直接锐化</text>
  <text class="label" x="665" y="340">temporal_unsharp</text>
  <text class="label" x="820" y="575">selected → unsharp</text>
</svg>
