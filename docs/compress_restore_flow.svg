<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="900" viewBox="0 0 1280 900">
  <defs>
    <style>
      .bg{fill:#f8fafc}.title{font:700 30px Arial,"Microsoft YaHei",sans-serif;fill:#111827}.sub{font:15px Arial,"Microsoft YaHei",sans-serif;fill:#4b5563}.lane{fill:#eef2ff;stroke:#c7d2fe;stroke-width:1.5;rx:14}.box{fill:#fff;stroke:#2563eb;stroke-width:2;rx:10}.process{fill:#eff6ff;stroke:#2563eb;stroke-width:2;rx:10}.decision{fill:#fff7ed;stroke:#ea580c;stroke-width:2}.output{fill:#ecfdf5;stroke:#059669;stroke-width:2;rx:10}.note{fill:#f3f4f6;stroke:#9ca3af;stroke-width:1.4;rx:8}.text{font:17px Arial,"Microsoft YaHei",sans-serif;fill:#111827}.small{font:14px Arial,"Microsoft YaHei",sans-serif;fill:#374151}.tiny{font:13px Arial,"Microsoft YaHei",sans-serif;fill:#4b5563}.arrow{stroke:#374151;stroke-width:2.2;fill:none;marker-end:url(#arrow)}.dashed{stroke:#6b7280;stroke-width:2;fill:none;stroke-dasharray:6 5;marker-end:url(#arrow)}.label{font:14px Arial,"Microsoft YaHei",sans-serif;fill:#374151}
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#374151"/></marker>
  </defs>
  <rect class="bg" width="1280" height="900"/>
  <text class="title" x="48" y="56">compress_restore 压缩还原流程</text>
  <text class="sub" x="48" y="84">主流程自上而下；右侧为视频逐帧输出分支，底部为统计汇总输出。</text>

  <rect class="lane" x="70" y="120" width="640" height="650"/>
  <text class="small" x="95" y="148">常规样本流程：图片或视频抽帧</text>
  <rect class="lane" x="785" y="120" width="385" height="430"/>
  <text class="small" x="810" y="148">视频 every-frame 分支</text>

  <rect class="box" x="260" y="175" width="260" height="70"/>
  <text class="text" x="340" y="205">输入媒体</text>
  <text class="small" x="303" y="228">图片 / 视频 / 目录</text>

  <polygon class="decision" points="390,285 520,350 390,415 260,350"/>
  <text class="text" x="333" y="345">任务分支</text>
  <text class="small" x="320" y="370">图片 / 视频抽帧</text>

  <rect class="process" x="120" y="475" width="230" height="82"/>
  <text class="text" x="165" y="508">读取单帧样本</text>
  <text class="small" x="150" y="532">image 或 iter_video_samples</text>

  <rect class="process" x="430" y="475" width="230" height="82"/>
  <text class="text" x="475" y="508">压缩到目标比例</text>
  <text class="small" x="470" y="532">resize_by_scale</text>

  <rect class="process" x="430" y="615" width="230" height="82"/>
  <text class="text" x="478" y="648">还原到原尺寸</text>
  <text class="small" x="455" y="672">restore_to_size + 可选锐化</text>

  <rect class="process" x="120" y="615" width="230" height="82"/>
  <text class="text" x="171" y="648">保存单帧结果</text>
  <text class="small" x="145" y="672">original / compressed / restored</text>

  <rect class="output" x="260" y="800" width="260" height="70"/>
  <text class="text" x="337" y="830">统计输出</text>
  <text class="small" x="295" y="852">CSV / JSON / metrics</text>

  <rect class="box" x="850" y="185" width="250" height="78"/>
  <text class="text" x="915" y="216">读取视频帧</text>
  <text class="small" x="888" y="240">VideoCapture 顺序读取</text>

  <rect class="process" x="850" y="315" width="250" height="88"/>
  <text class="text" x="922" y="348">逐帧压缩</text>
  <text class="small" x="888" y="372">写入 compressed.mp4</text>
  <text class="small" x="888" y="394">同步生成 restored frame</text>

  <rect class="output" x="850" y="455" width="250" height="78"/>
  <text class="text" x="920" y="486">视频输出</text>
  <text class="small" x="890" y="510">compressed.mp4 / restored.mp4</text>

  <rect class="note" x="805" y="610" width="330" height="100"/>
  <text class="small" x="830" y="642">核心指标：</text>
  <text class="tiny" x="830" y="666">PSNR / SSIM / Laplacian variance</text>
  <text class="tiny" x="830" y="690">JPEG bytes / 压缩率 / 处理耗时</text>

  <path class="arrow" d="M390 245 L390 285"/>
  <path class="arrow" d="M325 405 L235 475"/>
  <path class="arrow" d="M350 516 L430 516"/>
  <path class="arrow" d="M545 557 L545 615"/>
  <path class="arrow" d="M430 656 L350 656"/>
  <path class="arrow" d="M235 697 L330 800"/>

  <path class="dashed" d="M520 350 C660 350 745 225 850 225"/>
  <path class="arrow" d="M975 263 L975 315"/>
  <path class="arrow" d="M975 403 L975 455"/>
  <path class="dashed" d="M975 533 C1075 630 1045 835 520 835"/>

  <text class="label" x="210" y="450">常规抽帧</text>
  <text class="label" x="690" y="270">--every-frame</text>
</svg>
